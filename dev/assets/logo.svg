<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Cutaway.jl">
  <defs>
    <clipPath id="red-below">    <rect x="0" y="140" width="200" height="60"/>  </clipPath>
    <clipPath id="red-middle">   <rect x="0" y="100" width="200" height="40"/>  </clipPath>
    <clipPath id="red-above">    <rect x="0" y="0"   width="200" height="100"/> </clipPath>

    <clipPath id="green-below">  <rect x="0" y="110" width="200" height="90"/>  </clipPath>
    <clipPath id="green-middle"> <rect x="0" y="60"  width="200" height="50"/>  </clipPath>
    <clipPath id="green-above">  <rect x="0" y="0"   width="200" height="60"/>  </clipPath>

    <clipPath id="purple-below"> <rect x="0" y="125" width="200" height="75"/>  </clipPath>
    <clipPath id="purple-middle"><rect x="0" y="85"  width="200" height="40"/>  </clipPath>
    <clipPath id="purple-above"> <rect x="0" y="0"   width="200" height="85"/>  </clipPath>
  </defs>

  <rect x="26"  y="70" width="35" height="110" rx="3" fill="#CB3C33"                   clip-path="url(#red-below)"/>
  <rect x="26"  y="70" width="35" height="110" rx="3" fill="#CB3C33" fill-opacity="0.5" clip-path="url(#red-middle)"/>
  <rect x="26"  y="70" width="35" height="110" rx="3" fill="none" stroke="#CB3C33" stroke-width="4" clip-path="url(#red-above)"/>

  <rect x="83"  y="30" width="35" height="150" rx="3" fill="#389826"                   clip-path="url(#green-below)"/>
  <rect x="83"  y="30" width="35" height="150" rx="3" fill="#389826" fill-opacity="0.5" clip-path="url(#green-middle)"/>
  <rect x="83"  y="30" width="35" height="150" rx="3" fill="none" stroke="#389826" stroke-width="4" clip-path="url(#green-above)"/>

  <rect x="140" y="55" width="35" height="125" rx="3" fill="#9558B2"                   clip-path="url(#purple-below)"/>
  <rect x="140" y="55" width="35" height="125" rx="3" fill="#9558B2" fill-opacity="0.5" clip-path="url(#purple-middle)"/>
  <rect x="140" y="55" width="35" height="125" rx="3" fill="none" stroke="#9558B2" stroke-width="4" clip-path="url(#purple-above)"/>

  <line x1="16"  y1="100" x2="71"  y2="100" stroke="#222" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>
  <line x1="16"  y1="140" x2="71"  y2="140" stroke="#222" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>

  <line x1="73"  y1="60"  x2="128" y2="60"  stroke="#222" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>
  <line x1="73"  y1="110" x2="128" y2="110" stroke="#222" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>

  <line x1="130" y1="85"  x2="185" y2="85"  stroke="#222" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>
  <line x1="130" y1="125" x2="185" y2="125" stroke="#222" stroke-width="3" stroke-dasharray="6,4" stroke-linecap="round"/>
